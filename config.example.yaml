verification:
  mode: key
  key:
    path: /etc/cosign/cosign.pub
  kms:
    ref: hashicorp://vault/transit/keys/cosign
  # additional: OR-chain — any of these also accepted (key rotation / alternatives).
  # Supports all modes: key, kms, cert.
  # additional:
  #   - mode: key
  #     key:
  #       path: /etc/cosign/cosign-old.pub
  #   - mode: kms
  #     kms:
  #       ref: awskms://arn:aws:kms:us-east-1:123456789012:key/abc-123

  # required: AND-chain — ALL of these must also have signed/attested the image.
  # Use for multi-party signing (e.g. upstream signature + internal blessing).
  # required:
  #   - mode: key
  #     key:
  #       path: /etc/cosign/internal-blessing.pub
  #   - mode: attestation
  #     attestation:
  #       predicateType: https://example.com/internal-blessing/v1
  #       signingMode: key
  #       key:
  #         path: /etc/cosign/internal-blessing.pub
  #       claims:                      # optional: assert top-level predicate fields
  #         approved: "true"
  #         reviewer: ci-bot@example.com

  allowedRegistries:
    - registry.internal.example.com

registry:
  dockerConfigPath: /etc/docker/config.json
  tls:
    insecure: false
    caCertPath: /etc/verify-cmp/ca.crt
    skipVerify: false

referrers:
  manifestMediaType: application/vnd.acme.k8s-manifests.v1+tar
  extractDir: /tmp/manifests
  enableTagFallback: true
  # If the source ref's artifactType matches manifestMediaType, it is treated as
  # a standalone bundle and extracted directly (no referrers query needed).
  # Otherwise the source is treated as the app image and referrers are queried.

airgap:
  skipTlog: true
